<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto Rede Social</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body> 

    <div class="container">


        <!-- Sidebar -->
        <nav class="sidebar">
          <a href="#"><i class="fa-solid fa-house"></i></a>
          <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
          <a href="#"><i class="fa-solid fa-square-plus"></i></a>
          <a href="#"><i class="fa-solid fa-user"></i></a>
        </nav>
        
         <nav class="sidebar1"></nav>


       <!-- Logo -->
        <header class="topo">
            <h1 class="logo">DevSocial</h1>
        </header>
        
         
        <div class="conteudo">
            <!-- Cabeçalho do perfil -->
           <div class="perfil-card">
                <div class="perfil-info">
                  <img src="imagens/foto .jpg" class="post-avatar">

                    <div class="dados">
                     <label class="nome">Samuel Alves</label>
                     <label class="usuario">@samuelalves</label>
                    </div>

                  <button class="btn-editar">Editar Perfil</button>
                </div>  
            </div>


            <!-- Formulário -->
            <div class="form">

                <form class="form-post">
                  <input type="text" placeholder="Quais são as novidades?">
                   <button type="submit">Postar</button>
                </form>
   
            </div>
     
           <!-- Seção de Postagens -->
            <section class="posts">

              <!-- Postagem 1 -->
                <div class="post">

                    <div class="post-header">
                      <img src="imagens/7314cc1a88bf3cdc48347ab186e12e81.jpg" class="post-avatar">

                        <div class="post-user">
                         <label class="post-nome">João Silva</label>
                         <label class="post-usuario">@joaosilva</label>
                        </div>
                   </div>

                  <label class="post-conteudo">
                  Hoje foi um ótimo dia para estudar HTML e CSS!
                  </label>

                   <div class="post-interacoes">
                      <button class="btn-like">❤️</button>
                      <label>14 curtidas</label>
                      <button class="btn-coment">💬</button>
                      <label>3 comentários</label>
                   </div>

                </div>


               <!-- Postagem 2 -->
                <div class="post">

                    <div class="post-header">
                      <img src="imagens/7314cc1a88bf3cdc48347ab186e12e81.jpg" class="post-avatar">

                        <div class="post-user">
                          <label class="post-nome">Ana Paula</label>
                          <label class="post-usuario">@anapaula</label>
                        </div>
                    </div>

                    <label class="post-conteudo">
                    Estou montando minha primeira rede social para a faculdade 🚀
                    </label>

                    <div class="post-interacoes">
                       <button class="btn-like">❤️</button>
                       <label>9 curtidas</label>

                       <button class="btn-coment">💬</button>
                       <label>1 comentário</label>
                    </div>

                </div>

            </section>
        </div>
    </div>
</body>
